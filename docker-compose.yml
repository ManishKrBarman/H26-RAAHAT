# ═══════════════════════════════════════════════════════════
#  Raahat — Docker Compose
#
#  Usage:
#    docker compose up -d          # start all services
#    docker compose up -d --build  # rebuild after code changes
#    docker compose down            # stop all
#    docker compose down -v         # stop + delete database
#
#  All values are configurable via .env file.
#  See .env.example for documentation.
# ═══════════════════════════════════════════════════════════

services:

  # ── MongoDB ──
  mongodb:
    image: mongo:7
    container_name: raahat-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-raahat}
      # Uncomment for authenticated MongoDB (set in .env)
      # MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      # MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/${MONGO_DB_NAME:-raahat} --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - raahat-network
    restart: unless-stopped

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: raahat-backend
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_INTERNAL_PORT:-3000}"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/${MONGO_DB_NAME:-raahat}
      PORT: ${BACKEND_INTERNAL_PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}
      MODEL_API_URL: http://model:${MODEL_INTERNAL_PORT:-8000}/predict
      MODEL_TIMEOUT: ${MODEL_TIMEOUT:-240000}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - raahat-network
    restart: unless-stopped

  # ── Frontend (React + nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # This is baked into the JS bundle at build time.
        # It tells the browser where to send API requests.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    container_name: raahat-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - raahat-network
    restart: unless-stopped

  # ── Model Server (Python FastAPI + YOLOv8) ──
  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    container_name: raahat-model
    ports:
      - "${MODEL_PORT:-8000}:${MODEL_INTERNAL_PORT:-8000}"
    environment:
      BACKEND_URL: http://backend:${BACKEND_INTERNAL_PORT:-3000}
      MODEL_PORT: ${MODEL_INTERNAL_PORT:-8000}
      MODEL_PATH: ${MODEL_PATH:-/app/best2.pt}
      AUDIO_MODEL_PATH: ${AUDIO_MODEL_PATH:-/app/raahat_audio_model.h5}
    depends_on:
      - backend
    networks:
      - raahat-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  raahat-network:
    driver: bridge
